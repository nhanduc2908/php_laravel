version: '3.8'

services:
  nginx:
    volumes:
      - ./backend:/var/www/html:cached
      - ./.docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf

  php:
    build:
      target: development
    volumes:
      - ./backend:/var/www/html:cached
      - ./.docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - XDEBUG_CONFIG=remote_host=host.docker.internal
      - XDEBUG_MODE=debug

  realtime:
    environment:
      - NODE_ENV=development
      - DEBUG=socket.io:*
    volumes:
      - ./realtime:/app
      - /app/node_modules
    command: npm run dev

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: security-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root123

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"