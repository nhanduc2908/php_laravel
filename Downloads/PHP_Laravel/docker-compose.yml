version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: security-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./frontend/dist:/var/www/frontend
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - realtime
    networks:
      - security-network

  php:
    build:
      context: ./.docker
      dockerfile: Dockerfile.php
    container_name: security-php
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=production
    depends_on:
      - mysql
      - redis
    networks:
      - security-network

  mysql:
    image: mysql:8.0
    container_name: security-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: security_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - security-network

  redis:
    image: redis:alpine
    container_name: security-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - security-network

  realtime:
    build:
      context: ./.docker
      dockerfile: Dockerfile.node
    container_name: security-realtime
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - security-network

networks:
  security-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: